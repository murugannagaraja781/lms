publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  firebase_storage: ^12.3.5
  youtube_player_flutter: ^9.1.3
  url_launcher: ^6.3.1
  google_sign_in: ^6.2.1
  jitsi_meet_flutter_sdk: ^12.1.3
  phonepe_payment_sdk: ^3.0.2
  crypto: ^3.0.7
  fl_chart: ^1.2.0
  pdf: ^3.12.0
  printing: ^5.14.3
  intl: ^0.20.2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
